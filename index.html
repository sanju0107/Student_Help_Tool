<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Security Headers -->
    <!-- Content Security Policy: Prevent XSS, inline scripts, and unsafe content loading -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://cdn.jsdelivr.net;
      style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
      img-src 'self' data: https: blob:;
      font-src 'self' data: https://fonts.googleapis.com https://fonts.gstatic.com https://cdn.jsdelivr.net;
      connect-src 'self' https://www.google-analytics.com https://www.googletagmanager.com https://api.openai.com;
      frame-src 'self' https:;
      object-src 'none';
      media-src 'self' blob:;
      child-src 'self' blob:;
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'self'
    " />
    
    <!-- Prevent MIME type sniffing -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    
    <!-- Enable XSS protection in older browsers -->
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    
    <!-- Prevent clickjacking attacks -->
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    
    <!-- Referrer policy for privacy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Permissions policy: Restrict browser features -->
    <meta http-equiv="Permissions-Policy" content="
      accelerometer=(),
      ambient-light-sensor=(),
      autoplay=(),
      camera=(),
      cross-origin-isolated=(),
      display-capture=(),
      encrypted-media=(),
      fullscreen=(),
      geolocation=(),
      gyroscope=(),
      magnetometer=(),
      microphone=(),
      midi=(),
      payment=(),
      picture-in-picture=(),
      publickey-credentials-get=(),
      usb=(),
      xr-spatial-tracking=()
    " />
    
    <!-- Additional Security: Force HTTPS -->
    <meta http-equiv="Upgrade-Insecure-Requests" content="1" />
    
    <title>Student Help Tool - AI Powered</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Free AI-powered tools for students: PDF processing, image editing, AI resume builder, cover letter generator, and more." />
    <meta name="keywords" content="student tools, PDF, image editor, resume builder, cover letter, AI" />
    <meta name="theme-color" content="#3b82f6" />
    
    <!-- Open Graph for social sharing -->
    <meta property="og:title" content="Student Help Tool - AI Powered" />
    <meta property="og:description" content="Free AI-powered tools for students" />
    <meta property="og:type" content="website" />
    
    <!-- Google Analytics (with minimal data collection) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MY48Y5CKC6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MY48Y5CKC6', {
        'page_path': window.location.pathname,
        'anonymize_ip': true,
        'allow_google_signals': false,
        'allow_ad_personalization_signals': false
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
